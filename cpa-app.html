<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CPA Exam Prep: ISC Section</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Lora:wght@400;500&display=swap" rel="stylesheet">
    <style>
        /* Old Money / Ralph Lauren Color Palette */
        :root {
            --hunter-green: #1b3626;
            --ivory: #f8f6f0;
            --parchment: #ede9dc;
            --gold: #b59b54;
            --dark-charcoal: #2c2c2c;
            --muted-red: #8b3a3a;
            --muted-green: #4a6b53;
        }

        body {
            font-family: 'Lora', Georgia, serif;
            background-color: var(--parchment);
            color: var(--dark-charcoal);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .app-container {
            background-color: var(--ivory);
            border: 2px solid var(--hunter-green);
            outline: 1px solid var(--gold);
            outline-offset: -6px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
            width: 100%;
            max-width: 700px;
            overflow: hidden;
            position: relative;
        }

        .header {
            background-color: var(--hunter-green);
            color: var(--ivory);
            padding: 30px 20px;
            text-align: center;
            border-bottom: 3px solid var(--gold);
        }

        .header h1 {
            font-family: 'Playfair Display', serif;
            margin: 0;
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .header p {
            margin: 5px 0 0 0;
            font-style: italic;
            color: var(--gold);
        }

        .content-body {
            padding: 40px;
        }

        /* --- Typography & Buttons --- */
        h2 {
            font-family: 'Playfair Display', serif;
            color: var(--hunter-green);
            border-bottom: 1px solid var(--gold);
            padding-bottom: 10px;
            margin-top: 0;
        }

        .btn {
            font-family: 'Lora', Georgia, serif;
            background-color: var(--ivory);
            border: 1px solid var(--hunter-green);
            color: var(--hunter-green);
            padding: 12px 20px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: left;
            width: 100%;
            margin-bottom: 10px;
            border-radius: 2px;
        }

        .btn:hover:not([disabled]) {
            background-color: var(--hunter-green);
            color: var(--ivory);
        }

        .btn-primary {
            background-color: var(--hunter-green);
            color: var(--ivory);
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 1px;
            border: 1px solid var(--gold);
            font-weight: bold;
            padding: 15px;
            margin-top: 20px;
        }

        .btn-primary:hover {
            background-color: #122419;
            color: var(--gold);
        }

        /* --- Quiz Specific Styles --- */
        .question-text {
            font-size: 1.25rem;
            margin-bottom: 25px;
            line-height: 1.6;
            font-weight: 500;
        }

        .btn.correct {
            background-color: var(--muted-green);
            color: var(--ivory);
            border-color: var(--muted-green);
        }

        .btn.incorrect {
            background-color: var(--muted-red);
            color: var(--ivory);
            border-color: var(--muted-red);
        }

        .explanation {
            margin-top: 20px;
            padding: 15px 20px;
            background-color: #f2efe6;
            border-left: 3px solid var(--gold);
            display: none;
            font-size: 0.95rem;
            line-height: 1.5;
            font-style: italic;
        }

        .tracker {
            text-align: right;
            font-size: 0.9rem;
            color: var(--hunter-green);
            font-weight: bold;
            margin-top: 20px;
            border-top: 1px solid #ccc;
            padding-top: 15px;
        }

        /* --- Screens --- */
        #home-screen, #quiz-screen, #results-screen {
            display: none;
        }

        #home-screen.active, #quiz-screen.active, #results-screen.active {
            display: block;
        }

        /* --- Past Results Table & Review --- */
        .history-container, .review-container {
            margin-top: 20px;
            max-height: 250px;
            overflow-y: auto;
            border: 1px solid #ddd;
            padding: 10px;
            background-color: #fff;
        }

        .history-item, .review-item {
            padding: 10px;
            border-bottom: 1px dashed #ccc;
            font-size: 0.9rem;
        }
        .history-item:last-child, .review-item:last-child {
            border-bottom: none;
        }

        .review-item.review-correct { color: var(--muted-green); }
        .review-item.review-incorrect { color: var(--muted-red); }
        
        .score-callout {
            text-align: center;
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            color: var(--hunter-green);
            margin: 20px 0;
        }

        /* Scrollbar styling for a cleaner look */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--parchment); }
        ::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 4px; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <h1>ISC Examination</h1>
        <p>Information Systems and Controls</p>
    </div>
    
    <div class="content-body">
        <div id="home-screen" class="active">
            <h2>Welcome, Candidate</h2>
            <p>Prepare for the ISC discipline with this comprehensive examination. Your results will be recorded in the firm's archives (local storage).</p>
            
            <button class="btn btn-primary" onclick="startQuiz()">Commence Examination</button>

            <h3 style="margin-top: 40px; font-family: 'Playfair Display', serif; border-bottom: 1px solid var(--gold);">Archived Records</h3>
            <div id="history-list" class="history-container">
                </div>
            <button class="btn" style="margin-top: 10px; text-align: center; width: auto; font-size: 0.8rem;" onclick="clearHistory()">Clear Archives</button>
        </div>

        <div id="quiz-screen">
            <div class="question-text" id="question-text">Loading inquiry...</div>
            <div id="answer-buttons">
                </div>
            <div class="explanation" id="explanation-text"></div>
            
            <button class="btn btn-primary" id="next-btn" style="display: none;" onclick="nextQuestion()">Proceed to Next</button>
            
            <div class="tracker" id="question-tracker"></div>
        </div>

        <div id="results-screen">
            <h2>Examination Concluded</h2>
            <div class="score-callout" id="final-score-text"></div>
            
            <p><strong>Detailed Review:</strong></p>
            <div id="review-list" class="review-container">
                </div>

            <button class="btn btn-primary" onclick="returnToHome()">Return to Study</button>
        </div>
    </div>
</div>

<script>
    // ==========================================
    // PASTE ALL 60 OF YOUR QUESTIONS BELOW HERE
    // ==========================================
// --- ISC CPA Exam Question Bank (50 Questions) ---
    const questions = [
        // Topic: SOC Reporting
        {
            question: "Which Trust Services Criteria (TSC) is required to be included in every SOC 2 report?",
            answers: [
                { text: "Confidentiality", correct: false },
                { text: "Privacy", correct: false },
                { text: "Availability", correct: false },
                { text: "Security", correct: true }
            ],
            explanation: "Security (also known as the Common Criteria) is the foundational criteria and is mandatory for all SOC 2 and SOC 3 reports."
        },
        {
            question: "A SOC 1 report is primarily intended to evaluate controls relevant to what?",
            answers: [
                { text: "Internal controls over financial reporting (ICFR)", correct: true },
                { text: "Cybersecurity frameworks", correct: false },
                { text: "Data privacy regulations", correct: false },
                { text: "General IT operational efficiency", correct: false }
            ],
            explanation: "SOC 1 reports focus on a service organization's controls that are likely to be relevant to an audit of a user entity's financial statements (ICFR)."
        },
        {
            question: "Which of the following reports is designed for general use and can be freely distributed to the public?",
            answers: [
                { text: "SOC 1 Type 2", correct: false },
                { text: "SOC 2 Type 1", correct: false },
                { text: "SOC 3", correct: true },
                { text: "SOC for Cybersecurity", correct: false }
            ],
            explanation: "A SOC 3 report provides a summary of the SOC 2 report and is designed to be shared publicly as a marketing or general assurance tool."
        },
        {
            question: "What is the key difference between a Type 1 and Type 2 SOC report?",
            answers: [
                { text: "Type 1 covers security; Type 2 covers privacy.", correct: false },
                { text: "Type 1 evaluates design at a point in time; Type 2 evaluates design and operating effectiveness over a period of time.", correct: true },
                { text: "Type 1 is for management; Type 2 is for auditors.", correct: false },
                { text: "Type 1 is restricted use; Type 2 is general use.", correct: false }
            ],
            explanation: "Type 1 reports look at the design of controls on a specific date. Type 2 reports evaluate both design and operating effectiveness over a specific testing period (usually 6-12 months)."
        },
        {
            question: "When a service organization uses a subservice organization, which method includes the subservice organization's controls in the service organization's SOC report?",
            answers: [
                { text: "Carve-out method", correct: false },
                { text: "Inclusive method", correct: true },
                { text: "Complementary method", correct: false },
                { text: "Extractive method", correct: false }
            ],
            explanation: "The inclusive method includes the subservice organization's description of its system and its controls within the primary service organization's SOC report."
        },
        {
            question: "What does 'CUEC' stand for in the context of SOC reporting?",
            answers: [
                { text: "Control Utilization and Evaluation Criteria", correct: false },
                { text: "Complementary User Entity Controls", correct: true },
                { text: "Continuous User Evaluation Controls", correct: false },
                { text: "Corporate User Entity Compliance", correct: false }
            ],
            explanation: "Complementary User Entity Controls (CUECs) are controls that the service organization assumes the user entity (the customer) will implement for the overall system to achieve its control objectives."
        },
        {
            question: "Which Trust Services Criteria addresses whether personal information is collected, used, retained, disclosed, and disposed of to meet the entity's objectives?",
            answers: [
                { text: "Confidentiality", correct: false },
                { text: "Processing Integrity", correct: false },
                { text: "Privacy", correct: true },
                { text: "Security", correct: false }
            ],
            explanation: "The Privacy criteria specifically deals with Personal Information (PI) and Personally Identifiable Information (PII) according to the entity's privacy notice and commitments."
        },
        {
            question: "Who is responsible for providing the 'Management Assertion' in a SOC report?",
            answers: [
                { text: "The user entity's management", correct: false },
                { text: "The external auditor (Service Auditor)", correct: false },
                { text: "The service organization's management", correct: true },
                { text: "The AICPA", correct: false }
            ],
            explanation: "The service organization's management must provide a written assertion stating that the description of the system is fairly presented and that the controls were suitably designed (and operating effectively, if Type 2)."
        },
        {
            question: "An auditor is testing controls over the completeness and accuracy of data processing. Which TSC is being evaluated?",
            answers: [
                { text: "Availability", correct: false },
                { text: "Processing Integrity", correct: true },
                { text: "Security", correct: false },
                { text: "Confidentiality", correct: false }
            ],
            explanation: "Processing Integrity dictates that system processing must be complete, valid, accurate, timely, and authorized."
        },
        {
            question: "In a SOC 2 report, the auditor's opinion is based on criteria established by:",
            answers: [
                { text: "COSO", correct: false },
                { text: "ISACA (COBIT)", correct: false },
                { text: "AICPA (Trust Services Criteria)", correct: true },
                { text: "ISO/IEC 27001", correct: false }
            ],
            explanation: "SOC 2 reports are evaluated against the AICPA's Trust Services Criteria, which are aligned with the COSO internal control framework."
        },

        // Topic: Cloud Computing & Infrastructure
        {
            question: "Which cloud computing model provides the consumer with the capability to provision processing, storage, networks, and other fundamental computing resources?",
            answers: [
                { text: "Software as a Service (SaaS)", correct: false },
                { text: "Platform as a Service (PaaS)", correct: false },
                { text: "Infrastructure as a Service (IaaS)", correct: true },
                { text: "Function as a Service (FaaS)", correct: false }
            ],
            explanation: "IaaS provides the foundational infrastructure (servers, storage, networking) allowing the user to deploy and run arbitrary software."
        },
        {
            question: "In a SaaS environment, which entity is primarily responsible for securing the underlying network infrastructure?",
            answers: [
                { text: "The cloud consumer", correct: false },
                { text: "The cloud provider", correct: true },
                { text: "A third-party auditor", correct: false },
                { text: "Shared equally between consumer and provider", correct: false }
            ],
            explanation: "In the shared responsibility model for SaaS, the cloud provider manages the infrastructure, network, and application layer. The consumer is generally only responsible for user access and data."
        },
        {
            question: "A cloud deployment model where resources are provisioned for exclusive use by a single organization comprising multiple consumers is a:",
            answers: [
                { text: "Public Cloud", correct: false },
                { text: "Hybrid Cloud", correct: false },
                { text: "Community Cloud", correct: false },
                { text: "Private Cloud", correct: true }
            ],
            explanation: "A private cloud is dedicated entirely to one organization, offering higher security and control, though often at a higher cost."
        },
        {
            question: "What is a primary risk associated with a multi-tenant cloud environment?",
            answers: [
                { text: "Inability to scale resources", correct: false },
                { text: "Data leakage between tenants", correct: true },
                { text: "Lack of internet connectivity", correct: false },
                { text: "Hardware obsolescence for the tenant", correct: false }
            ],
            explanation: "Multi-tenancy means multiple customers share the same physical hardware. If logical segregation fails, data leakage between tenants is a major risk."
        },
        {
            question: "Which technology allows multiple virtual machines to run on a single physical server?",
            answers: [
                { text: "Hypervisor", correct: true },
                { text: "Load Balancer", correct: false },
                { text: "Firewall", correct: false },
                { text: "Router", correct: false }
            ],
            explanation: "A hypervisor (or virtual machine monitor) is software that creates and runs virtual machines, allocating the physical host's resources to each VM."
        },

        // Topic: Cryptography (Encryption, Hashing, PKI)
        {
            question: "In a public key infrastructure (PKI), which key is used by the sender to create a digital signature?",
            answers: [
                { text: "The sender's private key", correct: true },
                { text: "The sender's public key", correct: false },
                { text: "The receiver's private key", correct: false },
                { text: "The receiver's public key", correct: false }
            ],
            explanation: "To create a digital signature, the sender encrypts the hash of the message using their own PRIVATE key. The receiver uses the sender's PUBLIC key to verify it."
        },
        {
            question: "Which cryptographic process is one-way and used primarily to verify data integrity?",
            answers: [
                { text: "Symmetric Encryption", correct: false },
                { text: "Asymmetric Encryption", correct: false },
                { text: "Hashing", correct: true },
                { text: "Steganography", correct: false }
            ],
            explanation: "Hashing converts data into a fixed-size string of characters. It cannot be reversed (decrypted), making it perfect for checking if data has been altered."
        },
        {
            question: "If Alice wants to send a confidential, encrypted message to Bob using asymmetric encryption, which key should Alice use to encrypt the message?",
            answers: [
                { text: "Alice's public key", correct: false },
                { text: "Alice's private key", correct: false },
                { text: "Bob's public key", correct: true },
                { text: "Bob's private key", correct: false }
            ],
            explanation: "To ensure confidentiality, the sender (Alice) encrypts the message using the receiver's (Bob's) public key. Only Bob has the corresponding private key to decrypt it."
        },
        {
            question: "What is the primary advantage of symmetric encryption over asymmetric encryption?",
            answers: [
                { text: "It is faster and more efficient for large amounts of data.", correct: true },
                { text: "It solves the key distribution problem securely.", correct: false },
                { text: "It provides non-repudiation.", correct: false },
                { text: "It uses two mathematically related keys.", correct: false }
            ],
            explanation: "Symmetric encryption (same key for encryption/decryption) requires less computational power and is much faster than asymmetric encryption."
        },
        {
            question: "What provides independent verification that a specific public key belongs to a specific entity?",
            answers: [
                { text: "A digital certificate issued by a Certificate Authority (CA)", correct: true },
                { text: "A hashing algorithm", correct: false },
                { text: "A Virtual Private Network (VPN)", correct: false },
                { text: "A symmetric session key", correct: false }
            ],
            explanation: "A Certificate Authority (CA) acts as a trusted third party, issuing digital certificates that bind an identity to a public key."
        },

        // Topic: Access Controls & Security Operations
        {
            question: "Which access control model assigns permissions based on an individual's job function within the organization?",
            answers: [
                { text: "Discretionary Access Control (DAC)", correct: false },
                { text: "Mandatory Access Control (MAC)", correct: false },
                { text: "Role-Based Access Control (RBAC)", correct: true },
                { text: "Attribute-Based Access Control (ABAC)", correct: false }
            ],
            explanation: "RBAC grants access based on a user's role or job function, simplifying administration compared to granting permissions individually."
        },
        {
            question: "Requiring a user to provide a password and a code sent via SMS to log in is an example of:",
            answers: [
                { text: "Biometric authentication", correct: false },
                { text: "Single Sign-On (SSO)", correct: false },
                { text: "Multi-Factor Authentication (MFA)", correct: true },
                { text: "Federated Identity", correct: false }
            ],
            explanation: "MFA requires two or more independent credentials: what you know (password) and what you have (mobile phone receiving SMS)."
        },
        {
            question: "The principle of 'Least Privilege' means that:",
            answers: [
                { text: "Users should share passwords to minimize account creation.", correct: false },
                { text: "Users are granted only the permissions necessary to perform their duties.", correct: true },
                { text: "Administrators have unrestricted access to all systems.", correct: false },
                { text: "Guest accounts should have basic read/write access.", correct: false }
            ],
            explanation: "Least privilege restricts user access rights to only what is strictly required to do their jobs, minimizing the potential impact of an error or security breach."
        },
        {
            question: "Which of the following is a detective control?",
            answers: [
                { text: "Firewall", correct: false },
                { text: "Intrusion Detection System (IDS)", correct: true },
                { text: "Data encryption", correct: false },
                { text: "Security awareness training", correct: false }
            ],
            explanation: "An IDS monitors network traffic and alerts administrators of suspicious activity (detective). A firewall blocks traffic (preventative)."
        },
        {
            question: "To achieve proper Segregation of Duties (SoD) in an IT environment, a software developer should NOT have access to:",
            answers: [
                { text: "The development environment", correct: false },
                { text: "The testing environment", correct: false },
                { text: "The source code repository", correct: false },
                { text: "The live production environment", correct: true }
            ],
            explanation: "Developers should not have access to production systems. This prevents them from deploying unauthorized or untested code directly into the live environment."
        },
        {
            question: "A firewall that keeps track of the state of active connections and makes decisions based on the context of the traffic is called a:",
            answers: [
                { text: "Packet-filtering firewall", correct: false },
                { text: "Stateful inspection firewall", correct: true },
                { text: "Web application firewall (WAF)", correct: false },
                { text: "Proxy firewall", correct: false }
            ],
            explanation: "Stateful firewalls monitor the full state of active connections, whereas packet-filtering firewalls only look at individual packets in isolation."
        },
        {
            question: "What type of malware is designed to block access to a computer system or data until a sum of money is paid?",
            answers: [
                { text: "Spyware", correct: false },
                { text: "Trojan Horse", correct: false },
                { text: "Ransomware", correct: true },
                { text: "Adware", correct: false }
            ],
            explanation: "Ransomware encrypts a victim's files, and the attacker demands a ransom payment to provide the decryption key."
        },
        {
            question: "An attacker manipulating human psychology to gain confidential information is known as:",
            answers: [
                { text: "Social Engineering", correct: true },
                { text: "Brute Force Attack", correct: false },
                { text: "SQL Injection", correct: false },
                { text: "Man-in-the-Middle Attack", correct: false }
            ],
            explanation: "Social engineering relies on human interaction and deception, such as phishing emails, to trick users into breaking security procedures."
        },
        {
            question: "What is a 'Zero-Day' vulnerability?",
            answers: [
                { text: "A flaw that has been patched for zero days.", correct: false },
                { text: "A software flaw known to the vendor but with no patch yet available.", correct: true },
                { text: "A virus that deletes all data at midnight.", correct: false },
                { text: "A vulnerability that poses zero risk.", correct: false }
            ],
            explanation: "A zero-day is a vulnerability unknown to those who should be interested in mitigating it (the vendor). Because there is no patch, 'zero days' have passed since it was known."
        },
        {
            question: "Which assessment simulates an attack from a malicious outsider to identify exploit vulnerabilities?",
            answers: [
                { text: "Vulnerability Scanning", correct: false },
                { text: "Penetration Testing", correct: true },
                { text: "Code Review", correct: false },
                { text: "Risk Assessment", correct: false }
            ],
            explanation: "Penetration testing (pen testing) goes beyond automated scanning by actively trying to exploit vulnerabilities to determine the extent to which an attacker could compromise the system."
        },

        // Topic: Data Management & Networks
        {
            question: "In a relational database, what is the purpose of a Primary Key?",
            answers: [
                { text: "To encrypt the table data.", correct: false },
                { text: "To link data to another table.", correct: false },
                { text: "To uniquely identify each record in a table.", correct: true },
                { text: "To sort data alphabetically automatically.", correct: false }
            ],
            explanation: "A primary key ensures entity integrity by uniquely identifying every row in a database table. It cannot contain NULL values."
        },
        {
            question: "Which database concept involves organizing data to reduce redundancy and improve data integrity?",
            answers: [
                { text: "Data Mining", correct: false },
                { text: "Data Normalization", correct: true },
                { text: "Data Warehousing", correct: false },
                { text: "Data Scraping", correct: false }
            ],
            explanation: "Normalization is the process of structuring a relational database to minimize duplication of information and safeguard the database against logical anomalies."
        },
        {
            question: "A Foreign Key in a database table must:",
            answers: [
                { text: "Be entirely unique.", correct: false },
                { text: "Match a Primary Key in another table or be NULL.", correct: true },
                { text: "Be encrypted.", correct: false },
                { text: "Be a numeric value.", correct: false }
            ],
            explanation: "A foreign key creates a relationship between two tables. It must reference a valid primary key in the parent table to maintain referential integrity."
        },
        {
            question: "Which of the following creates a secure, encrypted connection over a less secure network like the internet?",
            answers: [
                { text: "Local Area Network (LAN)", correct: false },
                { text: "Virtual Private Network (VPN)", correct: true },
                { text: "Wide Area Network (WAN)", correct: false },
                { text: "Intranet", correct: false }
            ],
            explanation: "A VPN creates an encrypted tunnel for data transmission, protecting data in transit from eavesdropping on public networks."
        },
        {
            question: "An attack where malicious executable code is injected into a trusted website and executed by the victim's browser is called:",
            answers: [
                { text: "SQL Injection", correct: false },
                { text: "Cross-Site Scripting (XSS)", correct: true },
                { text: "Distributed Denial of Service (DDoS)", correct: false },
                { text: "Buffer Overflow", correct: false }
            ],
            explanation: "XSS targets the user's browser, whereas SQL injection targets the backend database."
        },
        {
            question: "What is the primary function of the Domain Name System (DNS)?",
            answers: [
                { text: "To encrypt web traffic.", correct: false },
                { text: "To translate human-readable domain names into IP addresses.", correct: true },
                { text: "To assign dynamic IP addresses to devices on a LAN.", correct: false },
                { text: "To block malicious incoming traffic.", correct: false }
            ],
            explanation: "DNS acts like the phonebook of the internet, mapping URLs (like google.com) to their underlying IP addresses so browsers can load internet resources."
        },
        {
            question: "Which backup strategy backs up only the files that have changed since the LAST backup of any kind?",
            answers: [
                { text: "Full Backup", correct: false },
                { text: "Differential Backup", correct: false },
                { text: "Incremental Backup", correct: true },
                { text: "Mirror Backup", correct: false }
            ],
            explanation: "Incremental backups are the fastest to perform because they only copy data changed since the previous backup (full or incremental), though they take longer to restore."
        },

        // Topic: SDLC & Change Management
        {
            question: "Which phase of the Systems Development Life Cycle (SDLC) involves creating the technical blueprints for the system?",
            answers: [
                { text: "Planning", correct: false },
                { text: "Analysis", correct: false },
                { text: "Design", correct: true },
                { text: "Implementation", correct: false }
            ],
            explanation: "During the Design phase, the requirements gathered in the Analysis phase are translated into technical specifications (database design, UI, network architecture)."
        },
        {
            question: "Which software development methodology emphasizes iterative progress, collaboration, and flexibility to changing requirements?",

    // App State Variables
    let currentQuestionIndex = 0;
    let score = 0;
    let sessionReview = []; // Tracks specific correct/incorrect answers for the review screen

    // DOM Elements
    const homeScreen = document.getElementById('home-screen');
    const quizScreen = document.getElementById('quiz-screen');
    const resultsScreen = document.getElementById('results-screen');
    
    const questionElement = document.getElementById('question-text');
    const answerButtonsElement = document.getElementById('answer-buttons');
    const explanationElement = document.getElementById('explanation-text');
    const nextButton = document.getElementById('next-btn');
    const trackerElement = document.getElementById('question-tracker');
    
    const finalScoreText = document.getElementById('final-score-text');
    const reviewList = document.getElementById('review-list');
    const historyList = document.getElementById('history-list');

    // Initialize App
    loadHistory();

    function startQuiz() {
        // Reset State
        currentQuestionIndex = 0;
        score = 0;
        sessionReview = [];
        
        // Switch Screens
        homeScreen.classList.remove('active');
        resultsScreen.classList.remove('active');
        quizScreen.classList.add('active');
        
        showQuestion(questions[currentQuestionIndex]);
    }

    function showQuestion(question) {
        resetState();
        questionElement.innerText = question.question;
        trackerElement.innerText = `Inquiry ${currentQuestionIndex + 1} of ${questions.length}`;
        
        question.answers.forEach(answer => {
            const button = document.createElement('button');
            button.innerText = answer.text;
            button.classList.add('btn');
            if (answer.correct) {
                button.dataset.correct = answer.correct;
            }
            // Pass the answer text so we can log it for the review
            button.addEventListener('click', (e) => selectAnswer(e, answer.text));
            answerButtonsElement.appendChild(button);
        });
    }

    function resetState() {
        nextButton.style.display = 'none';
        explanationElement.style.display = 'none';
        while (answerButtonsElement.firstChild) {
            answerButtonsElement.removeChild(answerButtonsElement.firstChild);
        }
    }

    function selectAnswer(e, selectedText) {
        const selectedButton = e.target;
        const isCorrect = selectedButton.dataset.correct === 'true';
        
        // Log for review
        sessionReview.push({
            questionNumber: currentQuestionIndex + 1,
            questionText: questions[currentQuestionIndex].question,
            isCorrect: isCorrect
        });

        if (isCorrect) {
            selectedButton.classList.add('correct');
            score++;
        } else {
            selectedButton.classList.add('incorrect');
            // Highlight the actual correct answer
            Array.from(answerButtonsElement.children).forEach(button => {
                if (button.dataset.correct === 'true') {
                    button.classList.add('correct');
                }
            });
        }

        // Disable buttons
        Array.from(answerButtonsElement.children).forEach(button => {
            button.disabled = true;
            button.style.cursor = 'default';
        });

        // Show Explanation
        explanationElement.innerText = "Note: " + questions[currentQuestionIndex].explanation;
        explanationElement.style.display = 'block';

        nextButton.style.display = 'block';
    }

    function nextQuestion() {
        currentQuestionIndex++;
        if (currentQuestionIndex < questions.length) {
            showQuestion(questions[currentQuestionIndex]);
        } else {
            finishQuiz();
        }
    }

    function finishQuiz() {
        // Save to local storage
        saveScore();

        // Switch Screens
        quizScreen.classList.remove('active');
        resultsScreen.classList.add('active');
        
        // Populate Score
        const percentage = Math.round((score / questions.length) * 100);
        finalScoreText.innerText = `${score} / ${questions.length} (${percentage}%)`;

        // Populate Detailed Review
        reviewList.innerHTML = '';
        sessionReview.forEach(item => {
            const div = document.createElement('div');
            div.classList.add('review-item');
            div.classList.add(item.isCorrect ? 'review-correct' : 'review-incorrect');
            div.innerHTML = `<strong>Q${item.questionNumber}:</strong> ${item.isCorrect ? 'Correct' : 'Incorrect'} <br> <em>${item.questionText}</em>`;
            reviewList.appendChild(div);
        });
    }

    function saveScore() {
        const percentage = Math.round((score / questions.length) * 100);
        const dateObj = new Date();
        const dateString = dateObj.toLocaleDateString() + ' ' + dateObj.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        
        const record = {
            date: dateString,
            score: score,
            total: questions.length,
            percentage: percentage
        };

        let pastScores = JSON.parse(localStorage.getItem('iscExamRecords')) || [];
        pastScores.push(record);
        localStorage.setItem('iscExamRecords', JSON.stringify(pastScores));
    }

    function loadHistory() {
        let pastScores = JSON.parse(localStorage.getItem('iscExamRecords')) || [];
        historyList.innerHTML = '';
        
        if (pastScores.length === 0) {
            historyList.innerHTML = '<div class="history-item">No records found in the archives.</div>';
            return;
        }

        // Reverse to show most recent first
        pastScores.slice().reverse().forEach((record, index) => {
            const div = document.createElement('div');
            div.classList.add('history-item');
            div.innerHTML = `<strong>${record.date}</strong> &mdash; Score: ${record.score}/${record.total} (${record.percentage}%)`;
            historyList.appendChild(div);
        });
    }

    function clearHistory() {
        if(confirm("Are you sure you wish to expunge all archived records?")) {
            localStorage.removeItem('iscExamRecords');
            loadHistory();
        }
    }

    function returnToHome() {
        loadHistory();
        resultsScreen.classList.remove('active');
        homeScreen.classList.add('active');
    }
